suite: HiveMQ Platform - CustomResource tests
templates:
  - hivemq-custom-resource.yml
release:
  name: test-hivemq-platform
chart:
  version: 0.0.1
  appVersion: 1.0.0
tests:

  - it: with default values, default CustomResource created
    asserts:
      - containsDocument:
          apiVersion: hivemq.com/v1
          kind: HiveMQPlatform
          name: test-hivemq-platform

  - it: with default values, only default labels created
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            helm.sh/chart: hivemq-platform-0.0.1
            app.kubernetes.io/name: hivemq-platform
            app.kubernetes.io/instance: test-hivemq-platform
            app.kubernetes.io/version: 1.0.0
            app.kubernetes.io/managed-by: Helm
      - notExists:
          path: metadata.annotations

  - it: with a custom operator selector
    set:
      operator.selector: north
    asserts:
      - exists:
          path: metadata.labels.operator
      - equal:
          path: metadata.labels.operator
          value: north

  - it: with default values, no operator selector label set
    asserts:
      - notExists:
          path: metadata.labels.operator

  - it: with nil operator selector value, no operator selector label set
    asserts:
      - notExists:
          path: metadata.labels.operator

  - it: with custom labels, custom HiveMQPlatform labels set
    set:
      operator.labels:
        group: alpha
        tier: one
    asserts:
      - exists:
          path: metadata.labels
      - isSubset:
          path: metadata.labels
          content:
            group: alpha
            tier: one
      - notExists:
          path: metadata.annotations

  - it: with invalid custom invalid labels, schema validation fails
    set:
      operator.labels: "invalid-label"
    asserts:
      - failedTemplate: {}

  - it: with custom annotations, custom annotations set
    set:
      operator.annotations:
        annotation-1: annotation-1
        annotation-2: annotation-2
    asserts:
      - exists:
          path: metadata.annotations
      - isSubset:
          path: metadata.annotations
          content:
            annotation-1: annotation-1
            annotation-2: annotation-2

  - it: with invalid custom annotations, schema validation fails
    set:
      operator.annotations: "invalid-annotation"
    asserts:
      - failedTemplate: {}

  - it: with image definition
    set:
      image.repository: test-repo
      image.name: test-image
      image.tag: snapshot
      image.pullPolicy: IfNotPresent
      image.pullSecretName: test-secret
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.imagePullSecrets[0]
      - equal:
          path: spec.statefulSet.spec.template.spec.imagePullSecrets[0].name
          value: test-secret
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].image
          value: test-repo/test-image:snapshot
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  - it: with override init containers
    set:
      config.overrideInitContainers: |-
        - name: test-init-container
          image: busybox
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.initContainers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.initContainers[0].name
          value: test-init-container
      - equal:
          path: spec.statefulSet.spec.template.spec.initContainers[0].image
          value: busybox

  - it: with additional init containers
    set:
      additionalInitContainers:
        - name: test-init-container
          image: busybox
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.initContainers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.initContainers[0].name
          value: test-init-container
      - equal:
          path: spec.statefulSet.spec.template.spec.initContainers[0].image
          value: busybox

  - it: with empty override init containers
    set:
      config.overrideInitContainers:
    asserts:
      - notExists:
          path: spec.statefulSet.spec.template.spec.initContainers

  - it: with empty additional init containers
    set:
      additionalInitContainers:
    asserts:
      - notExists:
          path: spec.statefulSet.spec.template.spec.initContainers

  - it: with default settings, no init containers
    asserts:
      - notExists:
          path: spec.statefulSet.spec.template.spec.initContainers

  - it: with override init containers and additional init containers, then fails
    set:
      additionalInitContainers:
        - name: foo-container
          image: busybox
      config.overrideInitContainers: |-
        - name: bar-container
          image: busybox
    asserts:
    - failedTemplate:
        errorPattern: Only `additionalInitContainers` or `config.overrideInitContainers` can be defined at a time

  - it: with default service account
    asserts:
      - notExists:
          path: spec.statefulSet.spec.template.spec.serviceAccountName

  - it: with custom service account
    set:
      nodes.serviceAccountName: my-custom-sa
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.serviceAccountName
      - equal:
          path: spec.statefulSet.spec.template.spec.serviceAccountName
          value: my-custom-sa

  - it: with containers
    set:
      nodes.replicaCount: 10
      nodes.logLevel: ERROR
    asserts:
      - equal:
          path: spec.logLevel
          value: ERROR
      - equal:
          path: spec.statefulSet.spec.replicas
          value: 10
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].name
          value: hivemq

  - it: with default values, no additional container is created
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].name
          value: hivemq

  - it: with additional containers
    values:
      - additional-containers-values.yaml
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 3
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].name
          value: hivemq
      - contains:
          path: spec.statefulSet.spec.template.spec.containers
          content:
            name: my-container1
            image: alpine:latest
            command: ['sh', '-c', 'while true; do echo "logging" >> /opt/logs.txt; sleep 1; done']
            volumeMounts:
              - name: data
                mountPath: /opt
      - contains:
          path: spec.statefulSet.spec.template.spec.containers
          content:
            name: my-container2
            image: alpine:latest
            env:
              - name: MY_ENV_VAR
                valueFrom:
                  secretKeyRef:
                    name: mysecretname
                    key: mysecretkey

  - it: with custom annotations for the HiveMQ container
    set:
      nodes.annotations:
         annotation-key-1: annotation-value-1
         annotation-key-2: annotation-value-2
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.metadata
      - exists:
          path: spec.statefulSet.spec.template.metadata.annotations
      - notExists:
          path: spec.statefulSet.spec.template.metadata.labels
      - equal:
          path: spec.statefulSet.spec.template.metadata.annotations
          value:
            annotation-key-1: annotation-value-1
            annotation-key-2: annotation-value-2

  - it: with custom labels for the HiveMQ container
    set:
      nodes.labels:
        label-key-1: label-value-1
        label-key-2: label-value-2
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.metadata
      - notExists:
          path: spec.statefulSet.spec.template.metadata.annotations
      - exists:
          path: spec.statefulSet.spec.template.metadata.labels
      - equal:
          path: spec.statefulSet.spec.template.metadata.labels
          value:
            label-key-1: label-value-1
            label-key-2: label-value-2

  - it: with custom annotations and labels for the HiveMQ container
    set:
      nodes.annotations:
        annotation-key-1: annotation-value-1
        annotation-key-2: annotation-value-2
      nodes.labels:
        label-key-1: label-value-1
        label-key-2: label-value-2
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.metadata
      - exists:
          path: spec.statefulSet.spec.template.metadata.annotations
      - exists:
          path: spec.statefulSet.spec.template.metadata.labels
      - equal:
          path: spec.statefulSet.spec.template.metadata.annotations
          value:
            annotation-key-1: annotation-value-1
            annotation-key-2: annotation-value-2
      - equal:
          path: spec.statefulSet.spec.template.metadata.labels
          value:
            label-key-1: label-value-1
            label-key-2: label-value-2

  - it: with custom environment variables for the HiveMQ container
    values:
      - custom-env-vars-values.yaml
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - exists:
          path: spec.statefulSet.spec.template.spec.containers[0].env
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].env
          content:
            name: MY_CUSTOM_ENV_VAR1
            value: "mycustomvalue1"
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].env
          content:
            name: MY_CUSTOM_ENV_VAR2
            valueFrom:
              secretKeyRef:
                name: mysecret
                key: mysecretkey
                optional: false
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].env
          content:
            name: MY_CUSTOM_ENV_VAR3
            valueFrom:
              configMapKeyRef:
                name: myconfigmap
                key: myconfigmapkey
                optional: true

  - it: with duplicated environment variables, validation fails
    set:
      nodes.env:
        - name: MY_ENV_VAR
          value: foo
        - name: MY_ENV_VAR
          value: bar
    asserts:
      - failedTemplate:
          errorMessage: "Duplicated environment variable `MY_ENV_VAR` found in the `.nodes.env` value"

  - it: with default environment variables defined in nodes.env, validation fails
    set:
      nodes.env:
        - name: JAVA_OPTS
          value: "-XX:InitialRAMPercentage=50 -XX:MaxRAMPercentage=50"
    asserts:
      - failedTemplate:
          errorMessage: "Default environment variable `JAVA_OPTS` for the HiveMQ Platform is not allowed to be set via `.nodes.env` value. Please use the corresponding values instead"

  - it: with default resource requests
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.cpu
          value: 1000m
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.memory
          value: 2048M
      - notExists:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.ephemeral-storage
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.memory
          value: 2048M
      - notExists:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.ephemeral-storage

  - it: with custom resource requests
    set:
      nodes.resources.cpu: 1c
      nodes.resources.memory: 1m
      nodes.resources.ephemeralStorage: 1M
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.cpu
          value: 1c
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.memory
          value: 1m
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.ephemeral-storage
          value: 1M
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.cpu
          value: 1c
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.memory
          value: 1m
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.ephemeral-storage
          value: 1M

  - it: with custom numeric for memory and ephemeralStorage resource requests, schema validation fails
    set:
      nodes.resources.memory: 2
      nodes.resources.ephemeralStorage: 3
    asserts:
      - failedTemplate: {}

  - it: with custom numeric CPU resource requests, schema validation succeeds
    set:
      nodes.resources.cpu: 2
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.cpu
          value: "2"
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.cpu
          value: "2"

  - it: with custom numeric resource requests as string
    set:
      nodes.resources.cpu: "1"
      nodes.resources.memory: "2"
      nodes.resources.ephemeralStorage: "3"
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.cpu
          value: "1"
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.memory
          value: "2"
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.ephemeral-storage
          value: "3"
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.cpu
          value: "1"
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.memory
          value: "2"
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.ephemeral-storage
          value: "3"

  - it: with override resource limits and default resource requests
    set:
      nodes.resources.overrideLimits:
        cpu: 2c
        memory: 2m
        ephemeral-storage: 2M
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.cpu
          value: 1000m
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.memory
          value: 2048M
      - notExists:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.ephemeral-storage
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.cpu
          value: 2c
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.memory
          value: 2m
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.ephemeral-storage
          value: 2M

  - it: with override resource limits and custom resource requests
    set:
      nodes.resources.cpu: 1c
      nodes.resources.memory: 1m
      nodes.resources.ephemeralStorage: 1M
      nodes.resources.overrideLimits:
        cpu: 2c
        memory: 2m
        ephemeral-storage: 2M
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.cpu
          value: 1c
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.memory
          value: 1m
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.ephemeral-storage
          value: 1M
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.cpu
          value: 2c
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.memory
          value: 2m
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.ephemeral-storage
          value: 2M

  - it: with override custom numeric resource limits as string
    set:
      nodes.resources.overrideLimits:
        cpu: "1"
        memory: "2"
        ephemeral-storage: "3"
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.cpu
          value: "1"
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.memory
          value: "2"
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits.ephemeral-storage
          value: "3"

  - it: with empty override resource limits
    set:
      nodes.resources.overrideLimits: {}
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.cpu
          value: 1000m
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.memory
          value: 2048M
      - notExists:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.ephemeral-storage
      - notExists:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits

  - it: with empty override resource limits and custom resource requests
    set:
      nodes.resources.cpu: 1c
      nodes.resources.memory: 1m
      nodes.resources.ephemeralStorage: 1M
      nodes.resources.overrideLimits: {}
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.containers
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers
          count: 1
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.cpu
          value: 1c
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.memory
          value: 1m
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.requests.ephemeral-storage
          value: 1M
      - notExists:
          path: spec.statefulSet.spec.template.spec.containers[0].resources.limits

  - it: with default values, no volumes are defined
    asserts:
      - notExists:
          path: spec.statefulSet.spec.template.spec.volumes
      - notExists:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts

  - it: with additional volumes
    values:
      - additional-volumes-values.yaml
    asserts:
      - exists:
          path: spec.statefulSet.spec.template.spec.volumes
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.volumes
          count: 8
      - contains:
          path: spec.statefulSet.spec.template.spec.volumes
          content:
            name: test-configmap-mount-volume
            configMap:
              name:  test-configmap-volume
      - contains:
          path: spec.statefulSet.spec.template.spec.volumes
          content:
            name: test-secret-volume
            secret:
              secretName: test-secret-volume
      - contains:
          path: spec.statefulSet.spec.template.spec.volumes
          content:
            name: test-empty-dir-volume
            emptyDir: {}
      - contains:
          path: spec.statefulSet.spec.template.spec.volumes
          content:
            name: test-persistent-volume-claim-volume
            persistentVolumeClaim:
              claimName: test-persistent-volume-claim-volume
      - contains:
          path: spec.statefulSet.spec.template.spec.volumes
          content:
            name: test-hivemq-configmap-volume-mount
            configMap:
              name: test-hivemq-configmap-volume
      - contains:
          path: spec.statefulSet.spec.template.spec.volumes
          content:
            name: test-non-hivemq-configmap-volume-mount
            configMap:
              name: test-non-hivemq-configmap-volume
      - contains:
          path: spec.statefulSet.spec.template.spec.volumes
          content:
            name: test-projected-volume
            projected:
              sources:
                - configMap:
                    items:
                      - key: config
                        path: my-config
                    name: test-projected-configmap-volume
                - secret:
                    name: test-projected-secret-volume
                    items:
                      - key: username
                        path: my-username
                - serviceAccountToken:
                    audience: api
                    expirationSeconds: 3600
                    path: token
      - exists:
          path: spec.statefulSet.spec.template.spec.containers[0]
      - equal:
          path: spec.statefulSet.spec.template.spec.containers[0].name
          value: hivemq
      - exists:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts
      - lengthEqual:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts
          count: 7
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts
          content:
            name: test-configmap-mount-volume
            mountPath: /additional-configmap-volume-1/subpath-configmap
            subPath: subpath-configmap
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts
          content:
            name: test-secret-volume
            mountPath: /additional-secret-volume
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts
          content:
            name: test-empty-dir-volume
            mountPath: /additional-empty-dir-volume
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts
          content:
            name: test-persistent-volume-claim-volume
            mountPath: /additional-persistent-volume-claim-volume
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts
          content:
            name: test-hivemq-configmap-volume-mount
            mountPath: /additional-configmap-volume-2/subpath-configmap
            subPath: subpath-configmap
      - notContains:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts
          content:
            name: test-non-hivemq-volume-mount
            mountPath: /additional-configmap-volume-3/subpath-configmap
            subPath: subpath-configmap
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts
          content:
            name: test-projected-volume
            mountPath: /additional-projected-volume
      - contains:
          path: spec.statefulSet.spec.template.spec.volumes
          content:
            name: test-shared-pvc-volume
            persistentVolumeClaim:
              claimName: test-shared-pvc-volume
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].volumeMounts
          content:
            name: test-shared-pvc-volume
            mountPath: /opt/hivemq/pvc
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].env
          content:
            name: HIVEMQ_DATA_FOLDER
            value: "/opt/hivemq/pvc/my-data"
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].env
          content:
            name: HIVEMQ_LOG_FOLDER
            value: "/opt/hivemq/pvc/my-log"
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].env
          content:
            name: HIVEMQ_HEAPDUMP_FOLDER
            value: "/opt/hivemq/pvc/my-dump"
      - contains:
          path: spec.statefulSet.spec.template.spec.containers[0].env
          content:
