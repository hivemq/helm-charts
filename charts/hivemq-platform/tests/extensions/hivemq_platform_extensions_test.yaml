suite: HiveMQ Platform - Extension tests
templates:
  - hivemq-custom-resource.yml
tests:

  - it: with default values, only allow all extension enabled
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 1
      - contains:
          path: spec.extensions
          content:
            id: hivemq-allow-all-extension
            enabled: true
            extensionUri: preinstalled
            supportsHotReload: false

  - it: with extensions enabled, all extensions set
    values:
      - extensions-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 4
      - contains:
          path: spec.extensions
          content:
            id: hivemq-custom-test-extension
            enabled: true
            supportsHotReload: false
            configMapName: "custom-extension-configuration"
            requestHeaderSecretName: custom-extension-auth-secret
            extensionUri: http://nginx-service/hivemq-custom-test-extension-1.0.0.zip
            customizationUri: http://nginx-service/hivemq-customization.zip
            extensionPriority: 1500
            extensionStartMandatory: true
            extensionStartPriority: 2000
            skipHttpsCertificateValidation: true
            skipHttpsHostnameVerification: false
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: true
            supportsHotReload: true
            configMapName: "hivemq-kafka-extension-test-configuration"
            extensionUri: preinstalled
            extensionStartMandatory: false
      - contains:
          path: spec.extensions
          content:
            id: hivemq-google-cloud-pubsub-extension
            enabled: true
            supportsHotReload: true
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: hivemq-distributed-tracing-extension
            enabled: false
            supportsHotReload: true
            secretName: "my-tracing-extension-secret-name"
            extensionUri: preinstalled

  - it: with extension name missing, schema validation fails
    set:
      extensions:
        - enabled: false
          supportsHotReload: true
    asserts:
      - failedTemplate:
          errorPattern: "missing property 'name'"

  - it: with duplicated extension names, validation fails
    set:
      extensions:
        - name: hivemq-distributed-tracing-extension
          enabled: false
          supportsHotReload: true
          configMapName: "my-tracing-extension-configmap-name"
        - name: hivemq-distributed-tracing-extension
          enabled: true
          supportsHotReload: false
          secretName: "my-tracing-extension-secret-name"
    asserts:
      - failedTemplate:
          errorPattern: 'Found duplicated extension name `hivemq-distributed-tracing-extension`'

  - it: with extension configMapName and secretName set, validation fails
    set:
      extensions:
        - name: hivemq-distributed-tracing-extension
          enabled: true
          supportsHotReload: true
          configMapName: "my-tracing-extension-configmap-name"
          secretName: "my-tracing-extension-secret-name"
    asserts:
      - failedTemplate:
          errorPattern: 'Both `configMapName` and `secretName` values are set for extension `hivemq-distributed-tracing-extension`. Only one can be defined at a time'

  - it: with extension configMapName and secretName empty, validation succeeds
    set:
      extensions:
        - name: hivemq-distributed-tracing-extension
          enabled: true
          supportsHotReload: true
          configMapName: ""
          secretName: ""
    asserts:
      - notFailedTemplate: {}
      - hasDocuments:
          count: 1

  - it: with extension having only name, all defaults are applied
    set:
      extensions:
        - name: minimal-extension
    asserts:
      - lengthEqual:
          path: spec.extensions
          count: 1
      - contains:
          path: spec.extensions
          content:
            id: minimal-extension
            enabled: false
            supportsHotReload: false
            extensionUri: preinstalled
      - notExists:
          path: spec.extensions[0].configMapName
      - notExists:
          path: spec.extensions[0].requestHeaderSecretName
      - notExists:
          path: spec.extensions[0].customizationUri
      - notExists:
          path: spec.extensions[0].extensionPriority
      - notExists:
          path: spec.extensions[0].extensionStartPriority
      - notExists:
          path: spec.extensions[0].extensionStartMandatory
      - notExists:
          path: spec.extensions[0].secretName
      - notExists:
          path: spec.extensions[0].skipHttpsCertificateValidation
      - notExists:
          path: spec.extensions[0].skipHttpsHostnameVerification

  - it: with priority and startPriority set to zero, zero values are preserved
    set:
      extensions:
        - name: zero-priority-extension
          enabled: true
          priority: 0
          startPriority: 0
    asserts:
      - contains:
          path: spec.extensions
          content:
            id: zero-priority-extension
            enabled: true
            supportsHotReload: false
            extensionUri: preinstalled
            extensionPriority: 0
            extensionStartPriority: 0

  - it: with optional fields absent, conditional fields are not rendered
    set:
      extensions:
        - name: test-extension
          enabled: true
          supportsHotReload: false
    asserts:
      - lengthEqual:
          path: spec.extensions
          count: 1
      - contains:
          path: spec.extensions
          content:
            id: test-extension
            enabled: true
            supportsHotReload: false
            extensionUri: preinstalled
      - notExists:
          path: spec.extensions[0].configMapName
      - notExists:
          path: spec.extensions[0].requestHeaderSecretName
      - notExists:
          path: spec.extensions[0].customizationUri
      - notExists:
          path: spec.extensions[0].extensionPriority
      - notExists:
          path: spec.extensions[0].extensionStartPriority
      - notExists:
          path: spec.extensions[0].extensionStartMandatory
      - notExists:
          path: spec.extensions[0].secretName
      - notExists:
          path: spec.extensions[0].skipHttpsCertificateValidation
      - notExists:
          path: spec.extensions[0].skipHttpsHostnameVerification

  - it: with secretName only, configMapName is not rendered
    set:
      extensions:
        - name: secret-extension
          enabled: true
          secretName: my-secret
    asserts:
      - contains:
          path: spec.extensions
          content:
            id: secret-extension
            enabled: true
            supportsHotReload: false
            secretName: my-secret
            extensionUri: preinstalled
      - notExists:
          path: spec.extensions[0].configMapName

  - it: with custom extensionUri containing special characters
    set:
      extensions:
        - name: custom-uri-extension
          enabled: true
          extensionUri: "https://artifacts.example.com/my-extension-1.0.0.zip?token=abc&version=latest"
    asserts:
      - contains:
          path: spec.extensions
          content:
            id: custom-uri-extension
            enabled: true
            supportsHotReload: false
            extensionUri: "https://artifacts.example.com/my-extension-1.0.0.zip?token=abc&version=latest"
