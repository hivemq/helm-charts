suite: HiveMQ Platform - Extension Merge tests
templates:
  - hivemq-custom-resource.yml
tests:

  - it: with extensionMap overriding default extension
    set:
      extensionMap:
        hivemq-allow-all-extension:
          enabled: false
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 1
      - contains:
          path: spec.extensions
          content:
            id: hivemq-allow-all-extension
            enabled: false
            extensionUri: preinstalled
            supportsHotReload: false

  - it: with extensionMap appending new extension alongside default
    set:
      extensionMap:
        hivemq-kafka-extension:
          enabled: true
          configMapName: kafka-config
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 2
      - contains:
          path: spec.extensions
          content:
            id: hivemq-allow-all-extension
            enabled: true
            extensionUri: preinstalled
            supportsHotReload: false
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: true
            configMapName: kafka-config
            extensionUri: preinstalled
            supportsHotReload: false

  - it: with extensionMap overriding and appending simultaneously
    set:
      extensionMap:
        hivemq-allow-all-extension:
          enabled: false
        hivemq-kafka-extension:
          enabled: true
          configMapName: kafka-config
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 2
      - contains:
          path: spec.extensions
          content:
            id: hivemq-allow-all-extension
            enabled: false
            extensionUri: preinstalled
            supportsHotReload: false
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: true
            configMapName: kafka-config
            extensionUri: preinstalled
            supportsHotReload: false

  - it: with hierarchical base config only, all map extensions rendered alongside default
    values:
      - hierarchical-base-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 4
      - contains:
          path: spec.extensions
          content:
            id: hivemq-allow-all-extension
            enabled: true
            extensionUri: preinstalled
            supportsHotReload: false
      - contains:
          path: spec.extensions
          content:
            id: hivemq-enterprise-security-extension
            enabled: true
            configMapName: ese-config
            supportsHotReload: true
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: true
            configMapName: kafka-config
            supportsHotReload: true
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: hivemq-distributed-tracing-extension
            enabled: true
            supportsHotReload: true
            configMapName: tracing-config
            extensionUri: preinstalled

  - it: with base + EU region override, kafka disabled but other fields preserved
    values:
      - hierarchical-base-values.yaml
      - hierarchical-region-eu-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 4
      - contains:
          path: spec.extensions
          content:
            id: hivemq-allow-all-extension
            enabled: true
            extensionUri: preinstalled
            supportsHotReload: false
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: false
            configMapName: kafka-config
            supportsHotReload: true
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: hivemq-enterprise-security-extension
            enabled: true
            configMapName: ese-config
            supportsHotReload: true
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: hivemq-distributed-tracing-extension
            enabled: true
            supportsHotReload: true
            configMapName: tracing-config
            extensionUri: preinstalled

  - it: with base + prod cluster adding custom extension
    values:
      - hierarchical-base-values.yaml
      - hierarchical-cluster-prod-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 5
      - contains:
          path: spec.extensions
          content:
            id: hivemq-allow-all-extension
            enabled: true
            extensionUri: preinstalled
            supportsHotReload: false
      - contains:
          path: spec.extensions
          content:
            id: custom-monitoring-extension
            enabled: true
            extensionUri: http://artifacts.internal/custom-monitoring-1.0.0.zip
            supportsHotReload: false

  - it: with base + EU region + dev cluster, kafka disabled and ese disabled
    values:
      - hierarchical-base-values.yaml
      - hierarchical-region-eu-values.yaml
      - hierarchical-cluster-dev-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 4
      - contains:
          path: spec.extensions
          content:
            id: hivemq-allow-all-extension
            enabled: true
            extensionUri: preinstalled
            supportsHotReload: false
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: false
            configMapName: kafka-config
            supportsHotReload: true
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: hivemq-enterprise-security-extension
            enabled: false
            configMapName: ese-config
            supportsHotReload: true
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: hivemq-distributed-tracing-extension
            enabled: true
            supportsHotReload: true
            configMapName: tracing-config
            extensionUri: preinstalled

  - it: with same extension in array and map, map fields merged on top of array entry
    values:
      - extension-map-partial-override-values.yaml
    asserts:
      - lengthEqual:
          path: spec.extensions
          count: 1
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: false
            requestHeaderSecretName: override-headers
            configMapName: base-kafka-config
            supportsHotReload: true
            extensionUri: preinstalled

  - it: with explicit empty extensionMap, default extensions unchanged
    set:
      extensionMap: {}
    asserts:
      - lengthEqual:
          path: spec.extensions
          count: 1
      - contains:
          path: spec.extensions
          content:
            id: hivemq-allow-all-extension
            enabled: true
            extensionUri: preinstalled
            supportsHotReload: false

  # The two tests below verify the documented contract: setting an `extensionMap` entry to `null` (or
  # leaving it implicit-null) in an override values file removes the extension from the merged result,
  # because Helm deep-merge strips null map keys before templates run.
  # They are skipped due to https://github.com/helm-unittest/helm-unittest/issues/845
  # (helm-unittest does not strip null keys during deep merge of values files).
  # Real Helm behavior can be verified manually with:
  #   helm template t ./charts/hivemq-platform \
  #     -f charts/hivemq-platform/tests/extensions/hierarchical-base-values.yaml \
  #     -f charts/hivemq-platform/tests/extensions/null-override-values.yaml
  # The output omits `hivemq-kafka-extension` from `spec.extensions`.
  #- it: with base extension nullified in override, extension is removed
  #  values:
  #    - hierarchical-base-values.yaml
  #    - null-override-values.yaml
  #  asserts:
  #    - exists:
  #        path: spec.extensions
  #    - lengthEqual:
  #        path: spec.extensions
  #        count: 3
  #    - contains:
  #        path: spec.extensions
  #        content:
  #          id: hivemq-enterprise-security-extension
  #          enabled: true
  #          configMapName: ese-config
  #          supportsHotReload: true
  #          extensionUri: preinstalled
  #    - contains:
  #        path: spec.extensions
  #        content:
  #          id: hivemq-distributed-tracing-extension
  #          enabled: true
  #          supportsHotReload: true
  #          configMapName: tracing-config
  #          extensionUri: preinstalled
  #    - notContains:
  #        path: spec.extensions
  #        content:
  #          id: hivemq-kafka-extension
  #        any: true

  #- it: with base extension implicit nullified in override, extension is removed
  #  values:
  #    - hierarchical-base-values.yaml
  #    - hierarchical-implicit-null-override-values.yaml
  #  asserts:
  #    - exists:
  #        path: spec.extensions
  #    - lengthEqual:
  #        path: spec.extensions
  #        count: 3
  #    - contains:
  #        path: spec.extensions
  #        content:
  #          id: hivemq-enterprise-security-extension
  #          enabled: true
  #          configMapName: ese-config
  #          supportsHotReload: true
  #          extensionUri: preinstalled
  #    - contains:
  #        path: spec.extensions
  #        content:
  #          id: hivemq-distributed-tracing-extension
  #          enabled: true
  #          supportsHotReload: true
  #          configMapName: tracing-config
  #          extensionUri: preinstalled
  #    - notContains:
  #        path: spec.extensions
  #        content:
  #          id: hivemq-kafka-extension
  #        any: true

  - it: with duplicated extension names in array, validation fails
    set:
      extensions:
        - name: hivemq-tracing-extension
          enabled: true
        - name: hivemq-tracing-extension
          enabled: false
      extensionMap:
        hivemq-kafka-extension:
          enabled: true
    asserts:
      - failedTemplate:
          errorPattern: 'Found duplicated extension name `hivemq-tracing-extension`'

  - it: with duplicated extension names in array and empty extensionMap, validation fails
    set:
      extensions:
        - name: hivemq-tracing-extension
          enabled: true
        - name: hivemq-tracing-extension
          enabled: false
      extensionMap: {}
    asserts:
      - failedTemplate:
          errorPattern: 'Found duplicated extension name `hivemq-tracing-extension`'

  - it: with duplicated extension names in array and map, validation succeeds and extension map entry takes precedence
    set:
      extensions:
        - name: hivemq-tracing-extension
          enabled: true
      extensionMap:
        hivemq-tracing-extension:
          enabled: false
    asserts:
      - lengthEqual:
          path: spec.extensions
          count: 1
      - contains:
          path: spec.extensions
          content:
            id: hivemq-tracing-extension
            enabled: false
            supportsHotReload: false
            extensionUri: preinstalled

  - it: with array configMapName and map secretName on same extension after merge, validation fails
    set:
      extensions:
        - name: hivemq-tracing-extension
          enabled: true
          configMapName: tracing-config
      extensionMap:
        hivemq-tracing-extension:
          secretName: tracing-secret
    asserts:
      - failedTemplate:
          errorPattern: 'Both `configMapName` and `secretName` values are set for extension `hivemq-tracing-extension`. Only one can be defined at a time'

  - it: with array configMapName and map secretName on same extension with null configMapName, validation succeeds
    values:
      - cross-source-configmap-secret-base-values.yaml
      - cross-source-null-configmap-secret-override-values.yaml
    asserts:
      - contains:
          path: spec.extensions
          content:
            id: hivemq-tracing-extension
            enabled: true
            supportsHotReload: false
            secretName: tracing-secret
            extensionUri: preinstalled
      - notExists:
          path: spec.extensions[?(@.id=="hivemq-tracing-extension")].configMapName

  - it: with array configMap and map secretName on different extensions, validation succeeds
    set:
      extensions:
        - name: extension-with-configmap
          enabled: true
          configMapName: my-config
      extensionMap:
        extension-with-secret:
          enabled: true
          secretName: my-secret
    asserts:
      - lengthEqual:
          path: spec.extensions
          count: 2
      - contains:
          path: spec.extensions
          content:
            id: extension-with-configmap
            enabled: true
            supportsHotReload: false
            configMapName: my-config
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: extension-with-secret
            enabled: true
            supportsHotReload: false
            secretName: my-secret
            extensionUri: preinstalled

  - it: with extensions array in base and extensionMap override in separate file, map fields merged on top
    values:
      - cross-source-base-values.yaml
      - region-override-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 2
      - contains:
          path: spec.extensions
          content:
            id: hivemq-ese
            enabled: true
            configMapName: ese-config
            supportsHotReload: false
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: false
            configMapName: region-kafka-config
            supportsHotReload: true
            extensionUri: preinstalled

  - it: with extensionMap null field removing inherited array field
    values:
      - cross-source-base-values.yaml
      - cross-source-null-field-override-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 2
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: false
            supportsHotReload: true
            extensionUri: preinstalled
      - notExists:
          path: spec.extensions[?(@.id=="hivemq-kafka-extension")].configMapName

  - it: with extensionMap empty string field overriding inherited array field
    values:
      - cross-source-base-values.yaml
      - cross-source-empty-field-override-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 2
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: false
            supportsHotReload: true
            configMapName: ""
            extensionUri: preinstalled

  - it: with extensionMap implicit null field removing inherited array field
    values:
      - cross-source-base-values.yaml
      - cross-source-implicit-null-field-override-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 2
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: false
            supportsHotReload: true
            extensionUri: preinstalled
      - notExists:
          path: spec.extensions[?(@.id=="hivemq-kafka-extension")].configMapName

  # `extensionMap` null entries can only remove extensions originally defined via `extensionMap`.
  # When the extension is defined via the `extensions` array, a null `extensionMap` override has no
  # effect on the array entry: Helm deep-merge strips the null map key, leaving the array untouched.
  - it: with extensions array in base and extensionMap null in override, array entry is preserved
    values:
      - cross-source-base-values.yaml
      - null-override-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 2
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: true
            configMapName: kafka-config
            supportsHotReload: true
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: hivemq-ese
            enabled: true
            configMapName: ese-config
            supportsHotReload: false
            extensionUri: preinstalled

  - it: with extensions array in base and multiple extensionMap overrides, last file takes precedence
    values:
      - cross-source-base-values.yaml
      - region-override-values.yaml
      - cluster-override-values.yaml
    asserts:
      - exists:
          path: spec.extensions
      - lengthEqual:
          path: spec.extensions
          count: 2
      - contains:
          path: spec.extensions
          content:
            id: hivemq-kafka-extension
            enabled: true
            supportsHotReload: true
            configMapName: cluster-kafka-config
            extensionUri: preinstalled
      - contains:
          path: spec.extensions
          content:
            id: hivemq-ese
            enabled: true
            configMapName: ese-config
            supportsHotReload: false
            extensionUri: preinstalled
