name: Sync branches with HiveMQ Platform Operator and HiveMQ K8s testsuite repos

on:
  pull_request:
    branches:
      - next-operator-release
    types: [ opened, synchronize, reopened, closed ]

jobs:
  sync-branches:
    name: Sync branches with hivemq-platform-operator and hivemq-k8s-testsuite repos
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repository: [
          hivemq-platform-operator,
          hivemq-k8s-testsuite
        ]

    steps:
      - name: Checkout hivemq/${{ matrix.repository }} on next-operator-release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: hivemq/${{ matrix.repository }}
          ref: next-operator-release
          token: ${{ secrets.JENKINS_GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Check if same branch exists
        id: check-branch
        run: |
          echo "Checking if branch \"${GITHUB_HEAD_REF}\" exists on ${{ matrix.repository }}"
          BRANCH=$(git ls-remote origin ${GITHUB_HEAD_REF})
          if [[ -n "${BRANCH}" ]]; then
            echo "Same branch exists on ${{ matrix.repository }}"
            echo "branch_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Same branch does not exist on ${{ matrix.repository }}"
            echo "branch_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create new branch based on next-operator-release
        if: steps.check-branch.outputs.branch_exists == 'false'
        run: |
          BRANCH=${{ github.event.pull_request.head.ref }}
          git checkout -b $BRANCH
          git push origin $BRANCH

  cleanup-synced-branches:
    name: Cleanup synced branches on hivemq-platform-operator and hivemq-k8s-testsuite repos
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repository: [
          hivemq-platform-operator,
          hivemq-k8s-testsuite
        ]

    steps:
      - name: Checkout hivemq/${{ matrix.repository }} on next-operator-release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: hivemq/${{ matrix.repository }}
          ref: next-operator-release
          fetch-depth: 0
          token: ${{ secrets.JENKINS_GITHUB_TOKEN }}

      - name: Check if branch exists and has no unique commits
        id: check-branch
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Checking branch \"${BRANCH_NAME}\" on ${{ matrix.repository }}"
          REMOTE_BRANCH=$(git ls-remote origin "${BRANCH_NAME}")
          if [[ -z "${REMOTE_BRANCH}" ]]; then
            echo "Branch does not exist on ${{ matrix.repository }}"
            echo "should_delete=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch origin "${BRANCH_NAME}"
          AHEAD=$(git rev-list --count origin/next-operator-release..origin/"${BRANCH_NAME}")
          if [[ "${AHEAD}" -eq 0 ]]; then
            echo "Branch has no unique commits, safe to delete"
            echo "should_delete=true" >> "$GITHUB_OUTPUT"
          else
            echo "Branch has ${AHEAD} unique commit(s), keeping it"
            echo "should_delete=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete synced branch
        if: steps.check-branch.outputs.should_delete == 'true'
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Deleting branch \"${BRANCH_NAME}\" on ${{ matrix.repository }}"
          git push origin --delete "${BRANCH_NAME}"
