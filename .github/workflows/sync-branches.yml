name: Sync branches with HiveMQ Platform Operator and HiveMQ K8s testsuite repos
on:
  pull_request:
    branches:
      - next-operator-release
jobs:
  sync-branches:
    name: Sync branches with hivemq-platform-operator and hivemq-k8s-testsuite repos
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repository: [
          hivemq-platform-operator,
          hivemq-k8s-testsuite
        ]

    steps:
      - name: Checkout hivemq/${{ matrix.repository }} on next-operator-release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: hivemq/${{ matrix.repository }}
          ref: next-operator-release
          token: ${{ secrets.JENKINS_GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Check if same branch exists
        id: check-branch
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF}"
          echo "Checking if branch \"${BRANCH_NAME}\" exists on ${{ matrix.repository }}"
          REMOTE_BRANCH=$(git ls-remote origin "${BRANCH_NAME}")
          if [[ -n "${REMOTE_BRANCH}" ]]; then
            echo "Same branch exists on ${{ matrix.repository }}"
            echo "branch_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Same branch does not exist on ${{ matrix.repository }}"
            echo "branch_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${BRANCH_NAME}" == renovate/* ]]; then
            echo "Branch is a Renovate branch"
            echo "is_renovate=true" >> "$GITHUB_OUTPUT"
          else
            echo "Branch is not a Renovate branch"
            echo "is_renovate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing Renovate branch
        if: steps.check-branch.outputs.branch_exists == 'true' && steps.check-branch.outputs.is_renovate == 'true'
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "Deleting existing Renovate branch \"${BRANCH}\" on ${{ matrix.repository }}"
          git push origin --delete "${BRANCH}"

      - name: Create new branch based on next-operator-release
        if: steps.check-branch.outputs.branch_exists == 'false' || steps.check-branch.outputs.is_renovate == 'true'
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          git checkout -b "${BRANCH}"
          git push origin "${BRANCH}"
