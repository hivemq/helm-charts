#file: noinspection UndefinedAction,UndefinedParamsPresent
name: HiveMQ Edge Helm Chart Integration Tests
on:
  workflow_call:
env:
  check-prefix: 'Test #'
  split-total: 2
  CI_RUN: true
jobs:
  generate-split-index-json:
    name: Generate split Edge integration tests indexes
    runs-on: ubuntu-latest
    outputs:
      json: ${{ steps.generate.outputs.split-index-json }}
    steps:
      - name: Generate split index list
        id: generate
        uses: donnerbart/split-tests-java-action/generate-split-index-json@a2563bba87a8c00280604597fa0c61181919a68f # v1
        with:
          split-total: ${{ env.split-total }}

  compile-integration-test:
    name: Compile Edge integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout HiveMQ Helm Charts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: helm-charts
          fetch-depth: 0

      - name: Set up JDK 25
        id: setup-java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          cache: gradle
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd-harvester

      - name: Warmup Gradle cache
        if: steps.setup-java.outputs.cache-hit == 'false'
        working-directory: helm-charts
        env:
          ORG_GRADLE_PROJECT_dockerHubUsername: ${{ secrets.DOCKER_USERNAME }}
          ORG_GRADLE_PROJECT_dockerHubPassword: ${{ secrets.DOCKER_TOKEN }}
          DEVELOCITY_SERVER_URL: ${{ secrets.DEVELOCITY_SERVER_URL }}
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        run: ./gradlew :tests-hivemq-edge:integrationTestPrepare

  run-integration-tests:
    name: "Test #${{ matrix.split-index }} (${{ matrix.k8s-version-type }})"
    runs-on: ubuntu-latest
    needs:
      - generate-split-index-json
      - compile-integration-test
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        split-index: ${{ fromjson(needs.generate-split-index-json.outputs.json) }}
        k8s-version-type: [
          MINIMUM,
          LATEST
        ]
    steps:
      - name: Checkout HiveMQ Helm Charts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: helm-charts
          fetch-depth: 0

      - name: Checkout JUnit reports
        uses: donnerbart/split-tests-java-action/checkout-junit-reports@a2563bba87a8c00280604597fa0c61181919a68f # v1
        with:
          split-index: ${{ matrix.split-index }}
          git-branch: junit-reports/edge/${{ github.base_ref }}
          path: junit-reports
          artifact-name: junit-xml-reports-edge-sha
          upload-artifact: ${{ matrix.k8s-version-type == 'LATEST' }}

      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          cache: gradle
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd-harvester

      - name: Compile integration tests
        working-directory: helm-charts
        env:
          ORG_GRADLE_PROJECT_dockerHubUsername: ${{ secrets.DOCKER_USERNAME }}
          ORG_GRADLE_PROJECT_dockerHubPassword: ${{ secrets.DOCKER_TOKEN }}
          DEVELOCITY_SERVER_URL: ${{ secrets.DEVELOCITY_SERVER_URL }}
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        run: ./gradlew :tests-hivemq-edge:integrationTestPrepare

      - name: Split tests
        id: split-tests
        uses: donnerbart/split-tests-java-action@a2563bba87a8c00280604597fa0c61181919a68f # v1
        with:
          split-index: ${{ matrix.split-index }}
          split-total: ${{ env.split-total }}
          glob: '**/helm-charts/tests-hivemq-edge/**/*{IT,Test}.java'
          junit-glob: '**/junit-reports/*.xml'
          format: 'gradle'
          new-test-time: 'average'
          calculate-optimal-total-split: true
          debug: true

      - name: Run integration tests
        working-directory: helm-charts
        env:
          ORG_GRADLE_PROJECT_dockerHubUsername: ${{ secrets.DOCKER_USERNAME }}
          ORG_GRADLE_PROJECT_dockerHubPassword: ${{ secrets.DOCKER_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_TOKEN }}
          K8S_VERSION_TYPE: ${{ matrix.k8s-version-type }}
          DEVELOCITY_SERVER_URL: ${{ secrets.DEVELOCITY_SERVER_URL }}
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        run: ./gradlew :tests-hivemq-edge:integrationTest ${{ steps.split-tests.outputs.test-suite }}

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: "HiveMQ Edge - Integration test results #${{ matrix.split-index }} (${{ matrix.k8s-version-type }})"
          path: |
            helm-charts/tests-hivemq-edge/build/reports/tests/integrationTest/
            helm-charts/tests-hivemq-edge/build/test-results/integrationTest/*.xml
          retention-days: 5

      - name: Upload JUnit report artifact
        if: matrix.k8s-version-type == 'LATEST'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: junit-xml-reports-edge-${{ matrix.split-index }}
          path: |
            helm-charts/tests-hivemq-edge/build/test-results/integrationTest/*.xml

      - name: Publish test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: Integration tests report
          path: '**/build/test-results/integrationTest/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          working-directory: helm-charts

      - name: Install xmllint
        if: failure()
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Set annotations for failed tests
        if: failure()
        run: |
          find helm-charts/tests-hivemq-edge/build/test-results/integrationTest -type f -name "*.xml" | while read -r FILE; do
            COUNT=$(xmllint --xpath 'count(//testcase[failure or error])' "$FILE")
            for INDEX in $(seq 1 "$COUNT"); do
              TEST_CLASS=$(xmllint --xpath "string((//testcase[failure or error])[$INDEX]/@classname)" "$FILE" 2>/dev/null)
              TEST_METHOD=$(xmllint --xpath "string((//testcase[failure or error])[$INDEX]/@name)" "$FILE" 2>/dev/null)
              MESSAGE=$(xmllint --xpath "string((//testcase[failure or error])[$INDEX]/failure/@message | (//testcase[failure or error])[$INDEX]/error/@message)" "$FILE" 2>/dev/null)
              [ -z "$MESSAGE" ] && MESSAGE="Test failed"
              echo "::error title=Test #${{ matrix.split-index }}::$TEST_CLASS.$TEST_METHOD%0A$MESSAGE"
            done
          done

  merge-junit-reports:
    name: Merge Edge JUnit reports
    runs-on: ubuntu-latest
    needs:
      - run-integration-tests
    permissions:
      contents: write
    steps:
      - name: Merge JUnit reports
        uses: donnerbart/split-tests-java-action/merge-junit-reports@a2563bba87a8c00280604597fa0c61181919a68f # v1
        with:
          git-branch: junit-reports/edge/${{ github.base_ref }}
          artifact-name: junit-xml-reports-edge-${{ github.base_ref }}
          split-artifact-pattern: junit-xml-reports-edge-*
