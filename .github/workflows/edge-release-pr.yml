name: "Create Edge Helm Chart Release PR"

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: 'HiveMQ Edge version (e.g., 2026.3)'
        required: true
        type: string
      dry-run:
        description: 'Dry run mode - skip creating PR'
        required: false
        default: false
        type: boolean

concurrency:
  group: edge-release-pr

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: 📦 Checkout helm-charts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🧹 Delete stale release branch if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api repos/${{ github.repository }}/git/ref/heads/next-edge-release --silent 2>/dev/null; then
            echo "Deleting existing next-edge-release branch"
            git push origin --delete next-edge-release
          else
            echo "No existing next-edge-release branch"
          fi

      - name: 🌿 Create release branch
        run: |
          git checkout -b next-edge-release

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: 🔧 Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5

      - name: 🔄 Update Edge chart version
        env:
          APP_VERSION: ${{ inputs.app_version }}
        run: |
          ./gradlew updateEdgeChartVersion -PappVersion="$APP_VERSION"

      - name: 📝 Commit changes
        env:
          APP_VERSION: ${{ inputs.app_version }}
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add charts/hivemq-edge/ manifests/hivemq-edge/
          git commit -m "Release HiveMQ Edge $APP_VERSION"

      - name: 🚀 Push and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry-run }}
          APP_VERSION: ${{ inputs.app_version }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "⚠️  DRY RUN: would push next-edge-release and create PR"
            git diff HEAD~1 --stat
          else
            git push origin next-edge-release
            gh pr create \
              --title "Release HiveMQ Edge $APP_VERSION" \
              --body "$(cat <<EOF
          Automated Helm chart update for HiveMQ Edge $APP_VERSION.

          ## Changes
          - Chart version bumped (patch increment)
          - App version set to $APP_VERSION
          - Image tag updated to $APP_VERSION
          - Manifests regenerated
          EOF
          )" \
              --base master \
              --head next-edge-release
          fi
