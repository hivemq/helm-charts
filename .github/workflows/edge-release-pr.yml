name: "Create Edge Helm Chart Release PR"

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: 'HiveMQ Edge version (e.g., 2026.3)'
        required: true
        type: string
      dry-run:
        description: 'Dry run mode - skip creating PR'
        required: false
        default: false
        type: boolean

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Checkout helm-charts
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: 🧹 Delete stale release branch if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api repos/${{ github.repository }}/git/ref/heads/next-edge-release --silent 2>/dev/null; then
            echo "Deleting existing next-edge-release branch"
            git push origin --delete next-edge-release
          else
            echo "No existing next-edge-release branch"
          fi

      - name: 🌿 Create release branch
        run: |
          git checkout -b next-edge-release

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 🔧 Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: 🔧 Set up Helm
        uses: azure/setup-helm@v4

      - name: 🔄 Update Edge chart version
        run: |
          ./gradlew updateEdgeChartVersion -PappVersion=${{ inputs.app_version }}

      - name: 📝 Commit changes
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add .
          git commit -m "Release HiveMQ Edge ${{ inputs.app_version }}"

      - name: 🚀 Push and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "⚠️  DRY RUN: would push next-edge-release and create PR"
            git diff HEAD~1 --stat
          else
            git push origin next-edge-release
            gh pr create \
              --title "Release HiveMQ Edge ${{ inputs.app_version }}" \
              --body "$(cat <<'EOF'
          Automated Helm chart update for HiveMQ Edge ${{ inputs.app_version }}.

          ## Changes
          - Chart version bumped (patch increment)
          - App version set to ${{ inputs.app_version }}
          - Image tag updated to ${{ inputs.app_version }}
          - Manifests regenerated
          EOF
          )" \
              --base master \
              --head next-edge-release
          fi
