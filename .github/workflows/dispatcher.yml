name: Helm Charts Dispatcher
on:
  pull_request:
concurrency:
  group: helm-charts-${{ github.ref }}
  cancel-in-progress: true
jobs:
  edge-changes:
    name: Edge changes
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.changes.outputs.modified }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            modified:
              - '.github/workflows/dispatcher.yml'
              - '.github/workflows/edge-*.yml'
              - 'charts/hivemq-edge/**'
              - 'manifests/hivemq-edge/**'
              - 'tests-hivemq-edge/**'
          list-files: csv

  swarm-changes:
    name: Swarm changes
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.changes.outputs.modified }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            modified:
              - '.github/workflows/dispatcher.yml'
              - '.github/workflows/swarm-*.yml'
              - 'charts/hivemq-swarm/**'
              - 'manifests/hivemq-swarm/**'
          list-files: csv

  platform-changes:
    name: Platform changes
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.changes.outputs.modified }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            modified:
              - '.github/workflows/dispatcher.yml'
              - '.github/workflows/platform-*.yml'
              - 'charts/hivemq-platform/**'
              - 'manifests/hivemq-platform/**'
              - 'tests-hivemq-platform-operator/**'
          list-files: csv

  platform-operator-changes:
    name: Platform Operator changes
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.changes.outputs.modified }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            modified:
              - '.github/workflows/dispatcher.yml'
              - '.github/workflows/platform-*.yml'
              - 'charts/hivemq-platform-operator/**'
              - 'manifests/hivemq-platform-operator/**'
              - 'tests-hivemq-platform-operator/**'
          list-files: csv

  edge-verify-tests:
    name: Edge verify tests
    needs: edge-changes
    if: needs.edge-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/edge-verify.yml
    secrets: inherit

  edge-smoke-test:
    name: Edge smoke tests
    needs: edge-changes
    if: needs.edge-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/edge-smoke-test.yml
    secrets: inherit

  edge-integration-tests:
    name: Edge integration tests
    needs:
      - edge-changes
    if: needs.edge-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/edge-integration-tests.yml
    secrets: inherit

  swarm-verify-tests:
    name: Swarm verify tests
    needs: swarm-changes
    if: needs.swarm-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/swarm-verify.yml
    secrets: inherit

  platform-verify-tests:
    name: Platform verify tests
    needs:
      - platform-changes
      - platform-operator-changes
    if: >
      needs.platform-changes.outputs.should-run == 'true' ||
      needs.platform-operator-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/platform-verify.yml
    secrets: inherit

  platform-smoke-test:
    name: Platform smoke tests
    needs:
      - platform-changes
      - platform-operator-changes
    if: >
      needs.platform-changes.outputs.should-run == 'true' ||
      needs.platform-operator-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/platform-smoke-test.yml
    secrets: inherit

  platform-integration-tests:
    name: Platform integration tests
    needs:
      - platform-changes
      - platform-operator-changes
    if: >
      needs.platform-changes.outputs.should-run == 'true' ||
      needs.platform-operator-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/platform-integration-tests.yml
    secrets: inherit

  tests-summary-report:
    name: Tests Summary Report
    runs-on: ubuntu-latest
    if: always()
    needs:
      - edge-verify-tests
      - edge-smoke-test
      - edge-integration-tests
      - swarm-verify-tests
      - platform-verify-tests
      - platform-smoke-test
      - platform-integration-tests
    steps:
      - name: Tests results summary
        if: |
          needs.edge-verify-tests.result == 'failure' ||
          needs.edge-smoke-test.result == 'failure' ||
          needs.edge-integration-tests.result == 'failure' ||
          needs.swarm-verify-tests.result == 'failure' ||
          needs.platform-verify-tests.result == 'failure' ||
          needs.platform-smoke-test.result == 'failure' ||
          needs.platform-integration-tests.result == 'failure'
        run: |
          echo "There are test failures."
          exit 1

  jenkins-composite-dispatch:
    name: Jenkins composite dispatch
    runs-on: ubuntu-latest
    needs:
      - edge-changes
      - swarm-changes
      - platform-changes
      - platform-operator-changes
    if: >
      needs.edge-changes.result == 'success' &&
      needs.swarm-changes.result == 'success' &&
      needs.platform-changes.result == 'success' &&
      needs.platform-operator-changes.result == 'success'
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Check whether Jenkins build is needed
        id: jenkins-build
        env:
          PLATFORM: ${{ needs.platform-changes.outputs.should-run }}
          OPERATOR: ${{ needs.platform-operator-changes.outputs.should-run }}
          SWARM: ${{ needs.swarm-changes.outputs.should-run }}
        run: |
          if [[ "$PLATFORM" == "true" || "$OPERATOR" == "true" || "$SWARM" == "true" ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Jenkins webhook payload
        id: payload
        if: steps.jenkins-build.outputs.needed == 'true'
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          BEFORE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '0000000000000000000000000000000000000000' }}
          REPOSITORY_JSON: ${{ toJSON(github.event.repository) }}
          ORGANIZATION_JSON: ${{ toJSON(github.event.organization) }}
          JENKINS_WEBHOOK_SECRET: ${{ secrets.JENKINS_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -nc \
            --arg ref "refs/heads/$BRANCH" \
            --arg before "$BEFORE_SHA" \
            --arg after "$HEAD_SHA" \
            --argjson repository "$REPOSITORY_JSON" \
            --argjson organization "$ORGANIZATION_JSON" \
            '{
              ref: $ref,
              before: $before,
              after: $after,
              repository: $repository,
              pusher: { name: "github-actions[bot]", email: "github-actions[bot]@users.noreply.github.com" },
              sender: { login: "github-actions[bot]", id: 41898282, type: "Bot" },
              organization: $organization,
              forced: false,
              created: false,
              deleted: false,
              base_ref: null,
              compare: ($repository.html_url + "/compare/" + ($before[0:7]) + "..." + ($after[0:7])),
              commits: [],
              head_commit: {
                id: $after,
                tree_id: $after,
                distinct: true,
                message: "GHA-dispatched build",
                timestamp: (now | todateiso8601),
                url: ($repository.html_url + "/commit/" + $after),
                author: { name: "github-actions[bot]", email: "github-actions[bot]@users.noreply.github.com", username: "github-actions[bot]" },
                committer: { name: "github-actions[bot]", email: "github-actions[bot]@users.noreply.github.com", username: "github-actions[bot]" },
                added: [],
                removed: [],
                modified: []
              }
            }')
          SIGNATURE_256="sha256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$JENKINS_WEBHOOK_SECRET" -hex | awk '{print $NF}')"
          echo "::add-mask::$SIGNATURE_256"
          DELIVERY=$(cat /proc/sys/kernel/random/uuid)
          echo "::add-mask::$DELIVERY"
          {
            echo "body<<__END__"
            echo "$PAYLOAD"
            echo "__END__"
            echo "signature=$SIGNATURE_256"
            echo "delivery=$DELIVERY"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger Jenkins composite build
        id: trigger
        if: steps.jenkins-build.outputs.needed == 'true'
        uses: fjogeleit/http-request-action@551353b829c3646756b2ec2b3694f819d7957495 # v2
        with:
          url: ${{ secrets.JENKINS_WEBHOOK_PAYLOAD_URL }}
          method: 'POST'
          contentType: 'application/json'
          data: ${{ steps.payload.outputs.body }}
          customHeaders: |
            {
              "X-GitHub-Event": "push",
              "X-Hub-Signature-256": "${{ steps.payload.outputs.signature }}",
              "X-GitHub-Delivery": "${{ steps.payload.outputs.delivery }}",
              "User-Agent": "GitHub-Hookshot/gha-dispatcher"
            }

      - name: Skip Jenkins composite build
        if: steps.jenkins-build.outputs.needed == 'false'
        uses: guibranco/github-status-action-v2@77639353504055053524efa7a3719aaf0b731ce9 # v1
        with:
          authToken: ${{ secrets.GITHUB_TOKEN }}
          context: "continuous-integration/jenkins/branch"
          state: "success"
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          target_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
