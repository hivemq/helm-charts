name: Helm Charts Dispatcher
on:
  pull_request:
concurrency:
  group: helm-charts-${{ github.ref }}
  cancel-in-progress: true
jobs:
  edge-changes:
    name: Edge changes
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.changes.outputs.modified }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            modified:
              - '.github/workflows/dispatcher.yml'
              - '.github/workflows/edge-*.yml'
              - 'charts/hivemq-edge/**'
              - 'manifests/hivemq-edge/**'
              - 'tests-hivemq-edge/**'
          list-files: csv

  swarm-changes:
    name: Swarm changes
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.changes.outputs.modified }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            modified:
              - '.github/workflows/dispatcher.yml'
              - '.github/workflows/swarm-*.yml'
              - 'charts/hivemq-swarm/**'
              - 'manifests/hivemq-swarm/**'
          list-files: csv

  platform-changes:
    name: Platform changes
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.changes.outputs.modified }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            modified:
              - '.github/workflows/dispatcher.yml'
              - '.github/workflows/platform-*.yml'
              - 'charts/hivemq-platform/**'
              - 'manifests/hivemq-platform/**'
              - 'tests-hivemq-platform-operator/**'
          list-files: csv

  platform-operator-changes:
    name: Platform Operator changes
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.changes.outputs.modified }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            modified:
              - '.github/workflows/dispatcher.yml'
              - '.github/workflows/platform-*.yml'
              - 'charts/hivemq-platform-operator/**'
              - 'manifests/hivemq-platform-operator/**'
              - 'tests-hivemq-platform-operator/**'
          list-files: csv

  edge-smoke-test:
    name: Edge smoke tests
    needs: edge-changes
    if: needs.edge-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/edge-smoke-test.yml
    secrets: inherit

  edge-verify-tests:
    name: Edge verify tests
    needs: edge-changes
    if: needs.edge-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/edge-verify.yml
    secrets: inherit

  edge-integration-tests:
    name: Edge integration tests
    needs:
      - edge-changes
    if: needs.edge-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/edge-integration-tests.yml
    secrets: inherit

  swarm-verify-tests:
    name: Swarm verify tests
    needs: swarm-changes
    if: needs.swarm-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/swarm-verify.yml
    secrets: inherit

  platform-verify-tests:
    name: Platform verify tests
    needs:
      - platform-changes
      - platform-operator-changes
    if: >
      needs.platform-changes.outputs.should-run == 'true' ||
      needs.platform-operator-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/platform-verify.yml
    secrets: inherit

  platform-smoke-test:
    name: Platform smoke tests
    needs:
      - platform-changes
      - platform-operator-changes
    if: >
      needs.platform-changes.outputs.should-run == 'true' ||
      needs.platform-operator-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/platform-smoke-test.yml
    secrets: inherit

  platform-integration-tests:
    name: Platform integration tests
    needs:
      - platform-changes
      - platform-operator-changes
    if: >
      needs.platform-changes.outputs.should-run == 'true' ||
      needs.platform-operator-changes.outputs.should-run == 'true'
    uses: ./.github/workflows/platform-integration-tests.yml
    secrets: inherit

  tests-summary-report:
    name: Tests Summary Report
    runs-on: ubuntu-latest
    if: always()
    needs:
      - edge-smoke-test
      - edge-verify-tests
      - swarm-verify-tests
      - platform-verify-tests
      - platform-smoke-test
      - platform-integration-tests
    steps:
      - name: Tests results summary
        if: |
          needs.edge-smoke-test.result == 'failure' ||
          needs.edge-verify-tests.result == 'failure' ||
          needs.swarm-verify-tests.result == 'failure' ||
          needs.platform-verify-tests.result == 'failure' ||
          needs.platform-smoke-test.result == 'failure' ||
          needs.platform-integration-tests.result == 'failure'
        run: |
          echo "There are test failures."
          exit 1

  jenkins-composite-dispatch:
    name: Jenkins composite dispatch
    runs-on: ubuntu-latest
    needs:
      - edge-changes
      - swarm-changes
      - platform-changes
      - platform-operator-changes
    if: >
      needs.edge-changes.result == 'success' &&
      needs.swarm-changes.result == 'success' &&
      needs.platform-changes.result == 'success' &&
      needs.platform-operator-changes.result == 'success'
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Check whether Jenkins build is needed
        id: jenkins-build
        env:
          PLATFORM: ${{ needs.platform-changes.outputs.should-run }}
          OPERATOR: ${{ needs.platform-operator-changes.outputs.should-run }}
          SWARM: ${{ needs.swarm-changes.outputs.should-run }}
        run: |
          if [[ "$PLATFORM" == "true" || "$OPERATOR" == "true" || "$SWARM" == "true" ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Jenkins composite build
        if: steps.jenkins-build.outputs.needed == 'true'
        uses: distributhor/workflow-webhook@2381f0e9c7b6bf061fb1405bd0804b8706116369 # v3
        with:
          webhook_url: ${{ secrets.JENKINS_WEBHOOK_PAYLOAD_URL }}
          webhook_secret: ${{ secrets.JENKINS_WEBHOOK_SECRET }}

      - name: Skip Jenkins composite build
        if: steps.jenkins-build.outputs.needed == 'false'
        uses: guibranco/github-status-action-v2@e8a8fa568b768f554cfe1d34e27e917aed4c6127 # v1.2.1
        with:
          authToken: ${{ secrets.GITHUB_TOKEN }}
          context: "continuous-integration/jenkins/branch"
          state: "success"
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          target_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
