name: HiveMQ Swarm Helm Chart Verify Tests
on:
  workflow_call:
jobs:
  run-verify-tests:
    name: Verify tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout HiveMQ Helm Charts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Read pinned Helm version
        id: helm-version
        run: echo "version=$(cat .helm-version)" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: ${{ steps.helm-version.outputs.version }}

      - name: Set up Kubeconform
        run: |
          helm plugin install https://github.com/jtyr/kubeconform-helm --verify=false

      - name: Lint
        if: always()
        run: |
          helm lint charts/hivemq-swarm

      - name: Unit Test
        if: always()
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false
          helm unittest "./charts/hivemq-swarm" -f ./tests/**/*_test.yaml

      - name: Check manifests are up-to-date
        if: always()
        run: |
          manifests/hivemq-swarm/manifests.sh
          git add manifests/ -v
          git diff HEAD --exit-code

      - name: Validate rendered manifests
        if: always()
        run: |
          helm kubeconform --config .github/configs/kubeconform.yml charts/hivemq-swarm -r hivemq-swarm-release -n hivemq-swarm-namespace

